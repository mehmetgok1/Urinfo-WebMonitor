<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Urinfo Dashboard</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --text-color: #cdd6f4;
            --card-bg: #313244;
            --accent: #89b4fa;
            --accent-hover: #b4befe;
            --success: #a6e3a1;
            --danger: #f38ba8;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-color);
        }
        h1 { color: var(--accent); margin-bottom: 5px; }
        .controls {
            margin: 20px 0;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 12px;
            display: inline-block;
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            margin: 5px; 
            cursor: pointer; 
            background-color: var(--accent); 
            color: #11111b;
            border: none; 
            border-radius: 8px; 
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover:not(:disabled) { background-color: var(--accent-hover); }
        button:disabled { background-color: #45475a; color: #7f849c; cursor: not-allowed; }
        
        #btnAuto {
            background-color: var(--success);
        }
        #btnAuto.active {
            background-color: var(--danger);
        }
        
        #status { font-weight: bold; font-size: 16px; margin-top: 10px; }
        
        .dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .sensor-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 13px;
            color: #7f849c;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-color);
        }

        .cameras-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            margin-top: 20px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
        }

        .camera-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .camera-box h3 {
            margin: 0 0 10px 0;
            color: var(--text-color);
            font-size: 18px;
        }

        canvas { 
            image-rendering: pixelated; 
            border: 4px solid #45475a; 
            border-radius: 8px;
            background-color: #11111b; 
        }

        #rgbCanvas { width: 256px; height: 256px; }
        #irCanvas { width: 256px; height: 192px; } /* 16x12 ratio scaled up */
    </style>
</head>
<body>

    <h1>Urinfo BLE Monitor</h1>
    
    <div class="controls">
        <button id="btnConnect">Connect via BLE</button>
        <button id="btnRequest" disabled>Request Frame</button>
        <button id="btnAuto" disabled>Start 1s Auto-Update</button>
        <div id="status">Status: Disconnected</div>
    </div>
    
    <div class="dashboard">
        <div class="sensor-cards">
            <div class="card">
                <div class="card-title">Battery</div>
                <div class="card-value" id="valBattery">-- %</div>
            </div>
            <div class="card">
                <div class="card-title">Ambient Light</div>
                <div class="card-value" id="valLux">-- Lux</div>
            </div>
            <div class="card">
                <div class="card-title">Internal Light</div>
                <div class="card-value" id="valAmbInt">--</div>
            </div>
            <div class="card">
                <div class="card-title">PIR Motion</div>
                <div class="card-value" id="valPir">--</div>
            </div>
            <div class="card" style="grid-column: span 2;">
                <div class="card-title">mmWave Radar</div>
                <div class="card-value" id="valMmwave" style="font-size: 16px;">--</div>
            </div>
        </div>
        
        <div class="cameras-container">
            <div class="camera-box">
                <h3>RGB Camera (64x64)</h3>
                <canvas id="rgbCanvas" width="64" height="64"></canvas>
            </div>
            <div class="camera-box">
                <h3>IR Camera (16x12)</h3>
                <canvas id="irCanvas" width="16" height="12"></canvas>
            </div>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "11111111-1111-1111-1111-111111111110"; 
        const ACTION_UUID  = "11111111-1111-1111-2222-111111111116";
        const RGB_UUID     = "c2a969f6-16e9-4e08-99e7-5e6086f6a546"; 
        const IR_UUID      = "d3b969f6-16e9-4e08-99e7-5e6086f6a547"; // New IR UUID
        
        // Sensor UUIDs (IMPORTANT: Update these with the UUIDs from your ble.h file!)
        const BATTERY_UUID = "11111111-1111-1111-2222-111111111111"; 
        const LUX_UUID     = "11111111-1111-1111-2222-111111111112";
        const PIR_UUID     = "11111111-1111-1111-2222-111111111113";
        const MMWAVE_UUID  = "11111111-1111-1111-2222-111111111114";
        const AMB_INT_UUID = "11111111-1111-1111-2222-111111111118";

        let bluetoothDevice, server, service;
        let actionChar, rgbChar, irChar;
        
        let rgbBuffer = new Uint8Array(8192); // 64x64 * 2
        let irBuffer = new Uint8Array(384);   // 16x12 * 2
        
        let autoInterval = null;

        document.getElementById('btnConnect').addEventListener('click', onConnectClick);
        document.getElementById('btnRequest').addEventListener('click', onRequestFrameClick);
        document.getElementById('btnAuto').addEventListener('click', toggleAutoUpdate);

        async function onConnectClick() {
            try {
                document.getElementById('status').innerText = 'Status: Connecting...';
                
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Urinfo_' }],
                    optionalServices: [SERVICE_UUID]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

                server = await bluetoothDevice.gatt.connect();
                service = await server.getPrimaryService(SERVICE_UUID);
                
                actionChar = await service.getCharacteristic(ACTION_UUID);
                rgbChar = await service.getCharacteristic(RGB_UUID);
                
                try {
                    irChar = await service.getCharacteristic(IR_UUID);
                    await irChar.startNotifications();
                    irChar.addEventListener('characteristicvaluechanged', handleIRChunk);
                } catch (e) {
                    console.warn("IR characteristic not found (FW might be old)", e);
                }
                
                await rgbChar.startNotifications();
                rgbChar.addEventListener('characteristicvaluechanged', handleRGBChunk);

                // Subscribe to basic sensors
                try {
                    const batChar = await service.getCharacteristic(BATTERY_UUID);
                    await batChar.startNotifications();
                    batChar.addEventListener('characteristicvaluechanged', (e) => updateVal('valBattery', e, '%'));

                    const luxChar = await service.getCharacteristic(LUX_UUID);
                    await luxChar.startNotifications();
                    luxChar.addEventListener('characteristicvaluechanged', (e) => updateVal('valLux', e, ' Lux'));

                    const pirChar = await service.getCharacteristic(PIR_UUID);
                    await pirChar.startNotifications();
                    pirChar.addEventListener('characteristicvaluechanged', (e) => updateVal('valPir', e, ''));

                    const ambIntChar = await service.getCharacteristic(AMB_INT_UUID);
                    await ambIntChar.startNotifications();
                    ambIntChar.addEventListener('characteristicvaluechanged', (e) => updateVal('valAmbInt', e, ''));

                    const mmwaveChar = await service.getCharacteristic(MMWAVE_UUID);
                    await mmwaveChar.startNotifications();
                    mmwaveChar.addEventListener('characteristicvaluechanged', handleMmwave);
                } catch(e) {
                    console.warn("Could not subscribe to some basic sensors. Check UUIDs.", e);
                }

                document.getElementById('status').innerText = 'Status: Connected!';
                document.getElementById('btnRequest').disabled = false;
                document.getElementById('btnAuto').disabled = false;
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = 'Status: Connection Failed';
            }
        }

        function updateVal(elementId, event, suffix) {
            const decoder = new TextDecoder();
            document.getElementById(elementId).innerText = decoder.decode(event.target.value) + suffix;
        }

        function handleMmwave(event) {
            const decoder = new TextDecoder();
            const val = decoder.decode(event.target.value);
            const parts = val.split(',');
            if(parts.length >= 5) {
                document.getElementById('valMmwave').innerHTML = 
                    `Mov: ${parts[0]}cm (${parts[1]}) | Stat: ${parts[2]}cm (${parts[3]}) | Det: ${parts[4]}cm`;
            } else {
                document.getElementById('valMmwave').innerText = val;
            }
        }

        async function onRequestFrameClick() {
            if (!actionChar) return;
            const encoder = new TextEncoder();
            // Send command to request both frames
            await actionChar.writeValue(encoder.encode("Com;Frames"));
        }

        function toggleAutoUpdate() {
            const btn = document.getElementById('btnAuto');
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
                btn.innerText = "Start 1s Auto-Update";
                btn.classList.remove("active");
                document.getElementById('status').innerText = 'Status: Auto-Update Stopped';
            } else {
                onRequestFrameClick(); // fetch immediately
                autoInterval = setInterval(() => {
                    onRequestFrameClick();
                }, 1000);
                btn.innerText = "Stop Auto-Update";
                btn.classList.add("active");
                document.getElementById('status').innerText = 'Status: Auto-Updating...';
            }
        }

        function handleRGBChunk(event) {
            const value = event.target.value;
            const offset = value.getUint16(0, true);
            const chunkLength = value.byteLength - 2;
            
            for (let i = 0; i < chunkLength; i++) {
                rgbBuffer[offset + i] = value.getUint8(2 + i);
            }
            
            if (offset + chunkLength >= 8192) {
                drawRGBFrame();
            }
        }
        
        function handleIRChunk(event) {
            const value = event.target.value;
            const offset = value.getUint16(0, true);
            const chunkLength = value.byteLength - 2;
            
            for (let i = 0; i < chunkLength; i++) {
                irBuffer[offset + i] = value.getUint8(2 + i);
            }
            
            if (offset + chunkLength >= 384) {
                drawIRFrame();
            }
        }

        function drawRGBFrame() {
            const canvas = document.getElementById('rgbCanvas');
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(64, 64);
            
            for (let i = 0; i < 4096; i++) {
                const pixel = rgbBuffer[i * 2] | (rgbBuffer[i * 2 + 1] << 8);
                imgData.data[i * 4]     = ((pixel >> 11) & 0x1F) * 255 / 31; 
                imgData.data[i * 4 + 1] = ((pixel >> 5)  & 0x3F) * 255 / 63; 
                imgData.data[i * 4 + 2] = (pixel         & 0x1F) * 255 / 31; 
                imgData.data[i * 4 + 3] = 255;                               
            }
            ctx.putImageData(imgData, 0, 0);
        }

        // Standard thermal color map (ironbow approximation)
        function getThermalColor(value, min, max) {
            let t = (value - min) / (max - min);
            if (t < 0) t = 0;
            if (t > 1) t = 1;
            
            // Simple thermal colormap
            const r = Math.min(255, Math.max(0, 255 * (2.5 * t - 0.5)));
            const g = Math.min(255, Math.max(0, 255 * (3 * t - 1.5)));
            const b = Math.min(255, Math.max(0, 255 * (2 * Math.sin(Math.PI * t))));
            
            return [r, g, b];
        }

        function drawIRFrame() {
            const canvas = document.getElementById('irCanvas');
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(16, 12);
            
            // The IR frame data is likely 16-bit integers (maybe temperatures in decided units)
            let rawValues = new Uint16Array(192);
            let minVal = 65535, maxVal = 0;
            
            for (let i = 0; i < 192; i++) {
                rawValues[i] = irBuffer[i * 2] | (irBuffer[i * 2 + 1] << 8);
                if (rawValues[i] < minVal) minVal = rawValues[i];
                if (rawValues[i] > maxVal) maxVal = rawValues[i];
            }
            
            // Prevent division by zero
            if (maxVal === minVal) maxVal = minVal + 1;

            for (let i = 0; i < 192; i++) {
                const color = getThermalColor(rawValues[i], minVal, maxVal);
                imgData.data[i * 4]     = color[0];
                imgData.data[i * 4 + 1] = color[1];
                imgData.data[i * 4 + 2] = color[2];
                imgData.data[i * 4 + 3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function onDisconnected() {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
                document.getElementById('btnAuto').innerText = "Start 1s Auto-Update";
                document.getElementById('btnAuto').classList.remove("active");
            }
            document.getElementById('status').innerText = 'Status: Disconnected';
            document.getElementById('btnRequest').disabled = true;
            document.getElementById('btnAuto').disabled = true;
        }
    </script>
</body>
</html>
