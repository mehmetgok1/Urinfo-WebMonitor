<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urinfo System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #39d353; --text: #c9d1d9; --chart-bg: #1c2128; --btn-ota: #8957e5; --btn-stop: #da3633; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header-container { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .fw-version { font-size: 0.8rem; color: #8b949e; font-family: monospace; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; width: 100%; max-width: 900px; margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid #30363d; padding: 15px; border-radius: 10px; text-align: center; }
        .value { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        .label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; margin-bottom: 5px; }
        
        .control-panel { width: 100%; max-width: 900px; background: var(--card); border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-sizing: border-box; }
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        input[type="text"], input[type="password"] { background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; flex: 1; min-width: 150px; }
        
        .hw-controls { display: flex; align-items: center; gap: 30px; padding-top: 15px; border-top: 1px solid #30363d; margin-top: 15px; flex-wrap: wrap; }
        .toggle-wrapper { display: flex; align-items: center; gap: 10px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #30363d; transition: .4s; border-radius: 34px; }
        .slider-round:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider-round { background-color: var(--accent); }
        input:checked + .slider-round:before { transform: translateX(22px); }
        
        .range-wrapper { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 15px; }
        input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }

        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 24px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; flex: 1; }
        button#btnStop { background: var(--btn-stop); }
        button#btnOTA { background: var(--btn-ota); }
        button#btnClear { background: #30363d; flex: 0.2; margin-top: 10px; }
        button:disabled { background: #444 !important; cursor: not-allowed; color: #8b949e; }

        .chart-container { width: 100%; max-width: 900px; background: var(--chart-bg); border: 1px solid #30363d; border-radius: 10px; padding: 15px; margin-bottom: 20px; box-sizing: border-box; }
        #debug { width: 100%; max-width: 900px; height: 120px; background: black; color: #39d353; font-family: monospace; font-size: 0.75rem; padding: 10px; overflow-y: scroll; border-radius: 5px; border: 1px solid #333; box-sizing: border-box; }
        canvas { max-height: 250px; }
        
        /* Specific rules to keep camera canvases square/pixelated without chart constraints */
        canvas.camera-view { image-rendering: pixelated; max-height: none; border: 2px solid #30363d; border-radius: 8px; background: #000; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Urinfo System</h1>
        <div class="fw-version">FW: <span id="fwVer">--</span></div>
    </div>

    <button id="btnConnect" onclick="startBLE()" style="margin-bottom: 20px; flex: none; width: 300px;">Connect Device</button>

    <div class="control-panel">
        <div class="label" style="margin-bottom: 10px;">Device Controls & OTA</div>
        <div class="input-group">
            <input type="text" id="startLabel" placeholder="Timestamp Label">
            <input type="text" id="otaVersion" placeholder="Version (e.g. 1.0.1)">
            <input type="text" id="wifiName" placeholder="WiFi Name">
            <input type="password" id="wifiPass" placeholder="WiFi Password">
        </div>
        <div class="btn-row">
            <button onclick="sendStartWithLabel()">Start</button>
            <button id="btnStop" onclick="sendCommand('Com;Stop')">Stop</button>
            <button id="btnOTA" onclick="sendOTA()">Start OTA</button>
        </div>

        <div class="hw-controls">
            <div class="toggle-wrapper">
                <span class="label">IR Light</span>
                <label class="switch">
                    <input type="checkbox" id="irToggle" onchange="toggleIR(this)">
                    <span class="slider-round"></span>
                </label>
            </div>
            <div class="range-wrapper">
                <span class="label">LED Brightness</span>
                <input type="range" id="ledSlider" min="0" max="100" value="0" oninput="updateLedValue(this.value)" onchange="sendLedBrightness(this.value)">
                <span id="ledValLabel" style="font-family: monospace; min-width: 30px;">0</span>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card"><div class="label">Battery</div><div class="value"><span id="valBat">--</span>%</div></div>
        <div class="card"><div class="label">Lux</div><div class="value" id="valLux">--</div></div>
        <div class="card"><div class="label">Ambient-I</div><div class="value" id="valAmbInt">--</div></div>
        <div class="card"><div class="label">PIR</div><div class="value" id="valPir">--</div></div>
        <div class="card"><div class="label">M-Dist</div><div class="value" id="valMDist">--</div></div>
        <div class="card"><div class="label">M-Enrg</div><div class="value" id="valMEnrg">--</div></div>
        <div class="card"><div class="label">S-Dist</div><div class="value" id="valSDist">--</div></div>
        <div class="card"><div class="label">S-Enrg</div><div class="value" id="valSEnrg">--</div></div>
        <div class="card"><div class="label">Detect</div><div class="value" id="valDDist">--</div></div>
    </div>

    <!-- NEW CAMERA PANEL -->
    <div class="control-panel">
        <div class="label" style="margin-bottom: 10px;">Camera Monitor (Auto-updating every 1 second)</div>
        
        <div style="display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;">
            <div style="text-align: center;">
                <div class="label">RGB Camera (16x16 downsampled)</div>
                <canvas id="rgbCanvas" class="camera-view" width="16" height="16" style="width: 256px; height: 256px;"></canvas>
            </div>
            
            <div style="text-align: center;">
                <div class="label">IR Thermal (16x12)</div>
                <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 5px;">
                    <canvas id="irCanvas" class="camera-view" width="16" height="12" style="width: 256px; height: 192px; border: 1px solid #555;"></canvas>
                    
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <div style="font-size: 11px; color: #ccc; margin-bottom: 2px;">50°C</div>
                        <canvas id="irColorbar" width="10" height="100" style="width: 20px; height: 160px; border: 1px solid #555;"></canvas>
                        <div style="font-size: 11px; color: #ccc; margin-top: 2px;">20°C</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="chart-container"><canvas id="luxChart" style="display: block; box-sizing: border-box; height: 250px; width: 868px;" width="868" height="250"></canvas></div>
    <div class="chart-container"><canvas id="pirChart" style="display: block; box-sizing: border-box; height: 250px; width: 868px;" width="868" height="250"></canvas></div>

    <div id="debug">System Log: Ready...<br></div>
    <button id="btnClear" onclick="document.getElementById('debug').innerHTML = ''">Clear Log</button>

<script>
    const SERVICE_UUID = '11111111-1111-1111-1111-111111111110';
    const UUID_ACTION  = '11111111-1111-1111-2222-111111111116';
    const UUID_MMWAVE  = '11111111-1111-1111-2222-111111111115';
    const UUID_VERSION = '11111111-1111-1111-2222-111111111117';
    
    // Camera UUIDs
    const UUID_RGB = 'c2a969f6-16e9-4e08-99e7-5e6086f6a546';
    const UUID_IR  = 'd3b969f6-16e9-4e08-99e7-5e6086f6a547';
    
    const SINGLE_CHARS = {
        'valBat': '11111111-1111-1111-2222-111111111112',
        'valLux': '11111111-1111-1111-2222-111111111113',
        'valPir': '11111111-1111-1111-2222-111111111114',
        'valAmbInt': '11111111-1111-1111-2222-111111111118'
    };

    let actionChar = null;
    
    // Global buffers for image data
    let rgbBuffer = new Uint8Array(512); // 16x16 * 2 (downsampled from 64x64)
    let irBuffer = new Uint8Array(384);   // 16x12 * 2

    function toggleIR(cb) {
        const state = cb.checked ? '1' : '0';
        sendCommand(`Com;Control;IR;${state}`);
    }

    function updateLedValue(val) {
        document.getElementById('ledValLabel').innerText = val;
    }

    function sendLedBrightness(val) {
        sendCommand(`Com;Control;LED;${val}`);
    }

    function getTimestamp() {
        const now = new Date();
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        const hours = String(now.getHours()).padStart(2, '0');
        const mins = String(now.getMinutes()).padStart(2, '0');
        return `${day}${month}${year}_${hours}${mins}`;
    }

    function log(m) {
        const d = document.getElementById('debug');
        d.innerHTML += `> ${m}<br>`;
        d.scrollTop = d.scrollHeight;
    }

    async function sendCommand(cmd) {
        if (!actionChar) { log("Error: Not connected"); return; }
        try {
            await actionChar.writeValue(new TextEncoder().encode(cmd));
            log(`Sent: ${cmd}`);
        } catch (e) { log(`Error: ${e.message}`); }
    }

    function sendStartWithLabel() {
        const labelValue = document.getElementById('startLabel').value || "Default";
        sendCommand(`Com;Start;${labelValue}`);
    }

    function sendOTA() {
        const ver = document.getElementById('otaVersion').value || "1.0.0";
        const ssid = document.getElementById('wifiName').value;
        const pass = document.getElementById('wifiPass').value;
        if (!ssid || !pass) { alert("WiFi info missing!"); return; }
        sendCommand(`Com;OTA;${ver};${ssid};${pass}`);
    }
    
    // ----- Camera Frame Handling -----
    function handleRGBChunk(event) {
        const value = event.target.value;
        const offset = value.getUint16(0, true);
        const chunkLength = value.byteLength - 2;
        for (let i = 0; i < chunkLength; i++) {
            rgbBuffer[offset + i] = value.getUint8(2 + i);
        }
        if (offset + chunkLength >= 512) drawRGBFrame();  // 16x16 = 512 bytes
    }
    
    function handleIRChunk(event) {
        const value = event.target.value;
        const offset = value.getUint16(0, true);
        const chunkLength = value.byteLength - 2;
        for (let i = 0; i < chunkLength; i++) {
            irBuffer[offset + i] = value.getUint8(2 + i);
        }
        if (offset + chunkLength >= 384) drawIRFrame();
    }

    function drawRGBFrame() {
        const canvas = document.getElementById('rgbCanvas');
        const ctx = canvas.getContext('2d');
        const imgData = ctx.createImageData(16, 16);  // 16x16 downsampled
        for (let i = 0; i < 256; i++) {  // 16*16 = 256 pixels
            const pixel = rgbBuffer[i * 2] | (rgbBuffer[i * 2 + 1] << 8);
            imgData.data[i * 4]     = ((pixel >> 11) & 0x1F) * 255 / 31;  // R
            imgData.data[i * 4 + 1] = ((pixel >> 5)  & 0x3F) * 255 / 63;  // G
            imgData.data[i * 4 + 2] = (pixel         & 0x1F) * 255 / 31;  // B
            imgData.data[i * 4 + 3] = 255;                                // A
        }
        ctx.putImageData(imgData, 0, 0);
    }
    function drawColorbar() {
        const canvas = document.getElementById('irColorbar');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const imgData = ctx.createImageData(width, height);

        // Virtual limits matching your thermal display mapping range
        const minTemp = 20.0;
        const maxTemp = 50.0;

        // Loop through every row of the colorbar canvas from top (0) to bottom (height)
        for (let y = 0; y < height; y++) {
            // Calculate the ratio: 0.0 at the top, 1.0 at the bottom
            const ratio = y / (height - 1);
            
            // Map the ratio to temperature: Top is hottest (50), Bottom is coldest (20)
            const currentTemp = maxTemp - ratio * (maxTemp - minTemp);
            
            // Get the color array [R, G, B] from your existing mapper function
            const color = getThermalColor(currentTemp, minTemp, maxTemp);

            // Fill the pixels for this entire row width
            for (let x = 0; x < width; x++) {
                const index = (y * width + x) * 4;
                imgData.data[index]     = color[0]; // R
                imgData.data[index + 1] = color[1]; // G
                imgData.data[index + 2] = color[2]; // B
                imgData.data[index + 3] = 255;      // Alpha
            }
        }

        ctx.putImageData(imgData, 0, 0);
    }

    // Call this once on startup to draw the static reference scale
    document.addEventListener("DOMContentLoaded", drawColorbar);

    function getThermalColor(val, min, max) {
        // 1. Clamp input value to range
        if (val < min) val = min;
        if (val > max) val = max;

        // 2. Normalize to a 0.0 - 1.0 float
        const v = (val - min) / (max - min);

        // 3. Jet colormap smooth interpolation math
        const r = Math.max(0, Math.min(255, Math.floor(255 * Math.min(4 * v - 1.5, -4 * v + 4.5))));
        const g = Math.max(0, Math.min(255, Math.floor(255 * Math.min(4 * v - 0.5, -4 * v + 3.5))));
        const b = Math.max(0, Math.min(255, Math.floor(255 * Math.min(4 * v + 0.5, -4 * v + 2.5))));

        return [r, g, b]; // Returns strict [R, G, B]
    }

    function drawIRFrame() {
        const canvas = document.getElementById('irCanvas');
        const ctx = canvas.getContext('2d');
        const imgData = ctx.createImageData(16, 12);
        
        // 1. Define your strict target temperature range in Celsius
        const COLOR_MIN_CELSIUS = 25.0;
        const COLOR_MAX_CELSIUS = 50.0;

        for (let i = 0; i < 192; i++) {
            // 2. Reconstruct the raw uint16 value from the incoming bytes
            const rawUint16 = irBuffer[i * 2] | (irBuffer[i * 2 + 1] << 8);
            
            // 3. Inverse operation: Convert back to actual Celsius float
            const celsius = (rawUint16 / 100.0) - 40.0;

            // 4. Pass the real Celsius value and your absolute bounds to the color mapper
            const color = getThermalColor(celsius, COLOR_MIN_CELSIUS, COLOR_MAX_CELSIUS);
            
            // 5. Populate the canvas pixel array
            imgData.data[i * 4]     = color[0]; // R
            imgData.data[i * 4 + 1] = color[1]; // G
            imgData.data[i * 4 + 2] = color[2]; // B
            imgData.data[i * 4 + 3] = 255;      // Alpha
        }
        
        ctx.putImageData(imgData, 0, 0);
    }
    // ---------------------------------

    function handleSingle(id, buf) {
        const clean = new TextDecoder().decode(buf).replace(/[^0-9.\-]/g, '');
        if (!clean) return;
        document.getElementById(id).innerText = clean;
        if (id === 'valLux') updateChart(luxChart, parseFloat(clean));
        if (id === 'valPir') updateChart(pirChart, parseFloat(clean));
    }

    const MMWAVE_IDS = ['valMDist', 'valMEnrg', 'valSDist', 'valSEnrg', 'valDDist'];
    function handleMmwave(buf) {
        const parts = new TextDecoder().decode(buf).split(',');
        if (parts.length !== MMWAVE_IDS.length) return;
        parts.forEach((v, i) => {
            const clean = v.replace(/[^0-9.\-]/g, '');
            if (clean) document.getElementById(MMWAVE_IDS[i]).innerText = clean;
        });
    }

    const chartConfig = (l, c) => ({
        type: 'line',
        data: { labels: [], datasets: [{ label: l, data: [], borderColor: c, tension: 0.3, fill: false, pointRadius: 0 }] },
        options: { responsive: true, animation: false, scales: { x: { display: false }, y: { beginAtZero: true } } }
    });

    const luxChart = new Chart(document.getElementById('luxChart').getContext('2d'), chartConfig('Lux', '#ffcc00'));
    const pirChart = new Chart(document.getElementById('pirChart').getContext('2d'), chartConfig('PIR', '#58a6ff'));

    function updateChart(chart, val) {
        chart.data.labels.push('');
        chart.data.datasets[0].data.push(val);
        if (chart.data.labels.length > 30) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
        chart.update('none');
    }

    async function subscribeChar(service, id, uuid, handler) {
        try {
            const char = await service.getCharacteristic(uuid);
            char.addEventListener('characteristicvaluechanged', (e) => handler(e.target.value));
            await char.startNotifications();
            log(`✓ ${id}`);
            const init = await char.readValue();
            handler(init);
        } catch (e) { log(`✗ ${id}`); }
    }

    async function startBLE() {
        const btn = document.getElementById('btnConnect');
        btn.disabled = true;
        btn.innerText = 'Searching...';

        try {
            log("Opening Bluetooth selector...");
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Urinfo_' }],
                optionalServices: [SERVICE_UUID]
            });

            log(`Connecting to ${device.name}...`);
            const server = await device.gatt.connect();

            const ts = getTimestamp();
            document.getElementById('startLabel').value = ts;

            const service = await server.getPrimaryService(SERVICE_UUID);
            
            try {
                const verChar = await service.getCharacteristic(UUID_VERSION);
                const verVal = await verChar.readValue();
                const verStr = new TextDecoder().decode(verVal);
                document.getElementById('fwVer').innerText = verStr;
                log(`✓ Firmware: ${verStr}`);
            } catch (vErr) { log("! Version unavailable"); }

            actionChar = await service.getCharacteristic(UUID_ACTION);
            log("✓ Command Link Ready");

            // Automatically send system time to ESP32 on connection
            const unixTimestamp = Math.floor(Date.now() / 1000);
            await sendCommand(`Com;SetTime;${unixTimestamp}`);
            log(`✓ Time synced: ${new Date().toLocaleString()}`);

            for (const [id, uuid] of Object.entries(SINGLE_CHARS)) {
                await subscribeChar(service, id, uuid, (buf) => handleSingle(id, buf));
                await new Promise(r => setTimeout(r, 150)); 
            }
            await subscribeChar(service, 'mmWave', UUID_MMWAVE, handleMmwave);
            
            // Subscribe to Camera Streams
            try {
                const rgbChar = await service.getCharacteristic(UUID_RGB);
                rgbChar.addEventListener('characteristicvaluechanged', handleRGBChunk);
                await rgbChar.startNotifications();
                log("✓ RGB Stream Ready");
            } catch(e) { log("! RGB stream unavailable"); }

            try {
                const irChar = await service.getCharacteristic(UUID_IR);
                irChar.addEventListener('characteristicvaluechanged', handleIRChunk);
                await irChar.startNotifications();
                log("✓ IR Stream Ready");
            } catch(e) { log("! IR stream unavailable"); }

            btn.innerText = 'Connected ✓';

            device.addEventListener('gattserverdisconnected', () => {
                log('Device Lost');
                actionChar = null;
                document.getElementById('fwVer').innerText = '--';
                btn.disabled = false;
                btn.innerText = 'Connect Device';
            });

        } catch (err) {
            log(`Error: ${err.message}`);
            btn.disabled = false;
            btn.innerText = 'Connect Device';
        }
    }
</script>

</body></html>
