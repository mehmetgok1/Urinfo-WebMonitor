events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # 1. ESP32 Device API Routing
        # Any request starting with /api/device/ goes to the Python receiver
        location /api/device/ {
            proxy_pass http://esp-data-receiver:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Web Monitor UI Routing (Admin Dashboard)
        # Any request to the root (/) goes to the frontend (Placeholder for now)
        location / {
            # proxy_pass http://web_frontend:3000; # Uncomment when we build the UI container
            
            # Temporary placeholder response until the frontend is built:
            add_header Content-Type text/plain;
            return 200 "Web Monitor UI Dashboard Placeholder. Please log in.";
        }
    }
}
